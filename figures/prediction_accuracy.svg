<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250">
  <style>text{font-family:sans-serif;font-size:12px}</style>
  <text x="300" y="25" text-anchor="middle" font-weight="bold" font-size="14">Prediction Accuracy (ppm)</text>
  <!-- axis -->
  <line x1="80" y1="50" x2="80" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="220" x2="570" y2="220" stroke="#333" stroke-width="1"/>
  <!-- bars -->
  <rect x="120" y="60" width="40" height="160" fill="#28A745" rx="3"/>
  <text x="140" y="235" text-anchor="middle" font-size="11">V1</text>
  <text x="140" y="55" text-anchor="middle" font-size="10" fill="#28A745">0.002</text>
  <rect x="220" y="62" width="40" height="158" fill="#2E86C1" rx="3"/>
  <text x="240" y="235" text-anchor="middle" font-size="11">V3</text>
  <text x="240" y="57" text-anchor="middle" font-size="10" fill="#2E86C1">0.010</text>
  <rect x="320" y="100" width="40" height="120" fill="#F39C12" rx="3"/>
  <text x="340" y="235" text-anchor="middle" font-size="11">V26</text>
  <text x="340" y="95" text-anchor="middle" font-size="10" fill="#F39C12">0.49</text>
  <rect x="420" y="170" width="40" height="50" fill="#E74C3C" rx="3"/>
  <text x="440" y="235" text-anchor="middle" font-size="11">V2</text>
  <text x="440" y="165" text-anchor="middle" font-size="10" fill="#E74C3C">354</text>
  <!-- labels -->
  <text x="75" y="225" text-anchor="end" font-size="10">0</text>
  <text x="75" y="65" text-anchor="end" font-size="10">sub-ppm</text>
  <text x="300" y="248" text-anchor="middle" font-size="10" fill="#666">m_p/m_e    α    m_n/m_e    Δm(n-p)</text>
</svg>