<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <style>text{font-family:sans-serif;font-size:13px}</style>
  <text x="300" y="25" text-anchor="middle" font-weight="bold" font-size="14">Gap Decomposition: 4·ln(6π⁵) = P + d_S·ln|W| − δ</text>
  <!-- P bar -->
  <rect x="50" y="50" width="360" height="40" fill="#2E86C1" rx="4"/>
  <text x="230" y="75" text-anchor="middle" fill="white" font-weight="bold">P = 23.397 (perturbative)</text>
  <!-- gap bar -->
  <rect x="410" y="50" width="140" height="40" fill="#28A745" rx="4"/>
  <text x="480" y="75" text-anchor="middle" fill="white" font-weight="bold">Gap = 6.664</text>
  <!-- decomposition -->
  <line x1="410" y1="100" x2="410" y2="130" stroke="#333"/>
  <rect x="410" y="130" width="110" height="30" fill="#D4EDDA" rx="3"/>
  <text x="465" y="150" text-anchor="middle" font-size="11">4·ln6 = 7.167</text>
  <rect x="520" y="130" width="30" height="30" fill="#F8D7DA" rx="3"/>
  <text x="535" y="150" text-anchor="middle" font-size="10">−δ</text>
  <!-- total -->
  <rect x="50" y="175" width="500" height="3" fill="#333"/>
  <text x="300" y="195" text-anchor="middle" font-size="12">Total = 30.0616 = 4·ln(6π⁵) ✓ (6 sig. fig.)</text>
</svg>